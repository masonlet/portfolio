<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <title>Contact - Mason L'Etoile</title>
  <meta name="description" content="Contact Mason L'Etoile - Get in touch via email form or social media links."/>

  <meta property="og:type" content="website">
  <meta property="og:title" content="Contact — Mason L'Etoile">
  <meta property="og:description" content="Get in touch via email form or social media links.">
  <meta property="og:url" content="https://masonletoile.ca/contacts.html">
  <meta property="og:image" content="https://masonletoile.ca/img/projects/masonlet/portfolio.webp">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="icon" type="image/png" href="/favicon.ico">

  <link rel="preload" href="/fonts/bebas-neue-v16-latin-regular.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" type="text/css" href="css/main.css">

  <script type="module" src="scripts/contact.ts"></script>
</head>
<body>
  <main id="contact-page" class="layout-double">
    <header>
      <div>
        <h1>Contact Me</h1>
        <p><a href="index.html" class="btn hover-cursor hover-bg">Return to home page</a></p>
      </div>
    </header>
    <div class="panels-double">
      <section class="panel-double">
          <nav class="panel-nav" aria-label="Contact Form Section">
            <a class="btn btn-full">Email Form</a>
          </nav>
          <div class="panel-content">
            <form id="contact-form">
              <label for="email">Email Address</label>
              <input type="email" id="email" name="email" class="email-input" placeholder="Enter email address.." required>

              <label for="subject">Subject</label>
              <input type="text" id="subject" name="subject" class="email-input" placeholder="Enter subject.." required>

              <label for="message">Message</label>
              <textarea id="message" name="message" class="email-input" placeholder="Enter message.." required></textarea>

              <input type="submit" value="Send Email" class="btn hover-cursor hover-bg">
              <div id="form-status"></div>
            </form>
          </div>
      </section>
      <section class="panel-double">
        <nav class="panel-nav" aria-label="Social Links Section">
          <a class="btn btn-full">Links</a>
        </nav>
        <div class="stack">
          <a href="mailto:contact@masonletoile.ca" class="btn btn-full hover-cursor hover-bg" title="masonletoile@hotmail.com">
            Email
          </a>
          <a href="https://www.linkedin.com/in/masonletoile/" class="btn btn-full hover-cursor hover-bg" target="_blank" rel="noopener noreferrer" title="https://www.linkedin.com/in/masonletoile/">
            LinkedIn
          </a>
          <a href="https://github.com/masonlet" class="btn btn-full hover-cursor hover-bg" target="_blank" rel="noopener noreferrer" title="https://github.com/masonlet">
            GitHub
          </a>
          <a href="resume.html" class="btn btn-full hover-cursor hover-bg" title="Click to view Resume">
            Resume
          </a>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
